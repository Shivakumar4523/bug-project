services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/pirnav_bug_tracking
      JWT_ACCESS_SECRET: pirnav_access_change_me
      JWT_REFRESH_SECRET: pirnav_refresh_change_me
      CLIENT_URL: http://localhost
      ADMIN_EMAIL: admin@pirnav.com
      ADMIN_PASSWORD: Pirnav@12345
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
  uploads:
